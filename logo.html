<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    font-family: 'Hiragino Sans', sans-serif;
    padding: 40px;
  }
  h2 {
    color: #333;
    font-size: 14px;
    margin-bottom: 8px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .logo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .logo-card {
    background: #fff;
    border-radius: 16px;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .logo-card .label {
    margin-top: 24px;
    font-size: 12px;
    color: #999;
    letter-spacing: 1px;
  }

  /* ===== A案: Montserrat 軽やか + グラデーション ===== */
  .logo-a {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 72px;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #7EC8E3 0%, #3A8FD6 50%, #2070B8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== B案: Raleway 繊細 + 水色メイン ===== */
  .logo-b {
    font-family: 'Raleway', sans-serif;
    font-weight: 500;
    font-size: 72px;
    letter-spacing: 12px;
    background: linear-gradient(90deg, #89CFF0 0%, #4AABE0 40%, #2B8CC4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== C案: Quicksand 丸みのある優しさ ===== */
  .logo-c {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 72px;
    letter-spacing: 10px;
    background: linear-gradient(135deg, #6BC5E8 0%, #3D9BE0 45%, #1D6FA8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== D案: Poppins モダン + アクセント ===== */
  .logo-d {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 72px;
    letter-spacing: 6px;
  }
  .logo-d .u { color: #7EC8E3; }
  .logo-d .m { color: #5FB8E0; }
  .logo-d .i { color: #45A8D8; }
  .logo-d .d { color: #3498D0; }
  .logo-d .a { color: #2888C8; }
  .logo-d .s { color: #1E78B8; }

  /* ===== E案: Montserrat Light 誠実 + 下線アクセント ===== */
  .logo-e-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-e {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 72px;
    letter-spacing: 14px;
    color: #2B7CB8;
  }
  .logo-e-line {
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #89CFF0, #2B7CB8);
    margin-top: 8px;
    border-radius: 2px;
  }

  /* ===== F案: Quicksand + タグライン ===== */
  .logo-f-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-f {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 68px;
    letter-spacing: 8px;
    background: linear-gradient(90deg, #7EC8E3 0%, #3090D0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-f-tagline {
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: #90C0DD;
    margin-top: 10px;
    font-weight: 500;
  }

  /* ===== 白背景 / ダーク背景 プレビュー ===== */
  .dark-card {
    background: #1a2a3a;
  }
  .dark-card .label {
    color: #667;
  }
  .logo-a-dark {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 72px;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #9DD8F0 0%, #5BB0E8 50%, #3A90D0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-c-dark {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 72px;
    letter-spacing: 10px;
    background: linear-gradient(135deg, #8DD4F0 0%, #5CB8E8 45%, #3898D0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>

<div class="logo-grid">

  <div class="logo-card">
    <div class="logo-a">UMIDAS</div>
    <div class="label">A: Montserrat Semi-Bold / グラデーション</div>
  </div>

  <div class="logo-card">
    <div class="logo-b">UMIDAS</div>
    <div class="label">B: Raleway Medium / 水色メイン</div>
  </div>

  <div class="logo-card">
    <div class="logo-c">UMIDAS</div>
    <div class="label">C: Quicksand Semi-Bold / 丸みのある優しさ</div>
  </div>

  <div class="logo-card">
    <div class="logo-d">
      <span class="u">U</span><span class="m">M</span><span class="i">I</span><span class="d">D</span><span class="a">A</span><span class="s">S</span>
    </div>
    <div class="label">D: Poppins / 一文字ずつグラデーション</div>
  </div>

  <div class="logo-card">
    <div class="logo-e-wrap">
      <div class="logo-e">UMIDAS</div>
      <div class="logo-e-line"></div>
    </div>
    <div class="label">E: Montserrat Light / 誠実 + 下線アクセント</div>
  </div>

  <div class="logo-card">
    <div class="logo-f-wrap">
      <div class="logo-f">UMIDAS</div>
      <div class="logo-f-tagline">COST REDUCTION PLATFORM</div>
    </div>
    <div class="label">F: Quicksand Bold / タグライン付き</div>
  </div>

  <!-- ダーク背景プレビュー -->
  <div class="logo-card dark-card">
    <div class="logo-a-dark">UMIDAS</div>
    <div class="label" style="color:#556;">A案 ダーク背景ver</div>
  </div>

  <div class="logo-card dark-card">
    <div class="logo-c-dark">UMIDAS</div>
    <div class="label" style="color:#556;">C案 ダーク背景ver</div>
  </div>

</div>

</body>
</html>
