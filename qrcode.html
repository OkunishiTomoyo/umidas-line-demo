<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
    flex-direction: column;
    gap: 20px;
  }
  canvas { display: block; }
  a {
    font-family: sans-serif;
    font-size: 14px;
    color: #2888dc;
    cursor: pointer;
  }
</style>
</head>
<body>
  <canvas id="qr"></canvas>
  <a id="download" download="umidas-qrcode.png">PNGをダウンロード</a>
  <script>
    QRCode.toCanvas(document.getElementById('qr'), 'https://line.me/R/ti/p/@179ztjdl', {
      width: 400,
      margin: 2,
      color: { dark: '#000000', light: '#ffffff' }
    }, function(error) {
      if (error) console.error(error);
      var canvas = document.getElementById('qr');
      document.getElementById('download').href = canvas.toDataURL('image/png');
    });
  </script>
</body>
</html>
