<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
  }
  .logo {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 120px;
    letter-spacing: 8px;
    background: linear-gradient(90deg, #B0DFEF 0%, #6CBCE0 25%, #3898D0 55%, #1A6CB5 85%, #0E4F8C 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>
  <div class="logo">UMIDAS</div>
</body>
</html>
