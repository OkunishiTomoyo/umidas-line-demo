<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    font-family: 'Hiragino Sans', sans-serif;
    padding: 40px;
  }
  .logo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .logo-card {
    background: #fff;
    border-radius: 16px;
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .label {
    margin-top: 20px;
    font-size: 12px;
    color: #999;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo-grid">

  <!-- A案: 六角形甲羅 + 横並び -->
  <div class="logo-card">
    <svg width="520" height="120" viewBox="0 0 520 120">
      <defs>
        <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7EC8E3"/>
          <stop offset="100%" style="stop-color:#2080C0"/>
        </linearGradient>
      </defs>
      <!-- 甲羅シンボル -->
      <g transform="translate(60,60)">
        <!-- 外枠 -->
        <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="none" stroke="url(#gA)" stroke-width="3"/>
        <!-- 内部六角パターン -->
        <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="none" stroke="url(#gA)" stroke-width="2" opacity="0.6"/>
        <!-- 放射線 -->
        <line x1="0" y1="-20" x2="0" y2="-45" stroke="url(#gA)" stroke-width="1.5" opacity="0.4"/>
        <line x1="17" y1="-10" x2="39" y2="-22.5" stroke="url(#gA)" stroke-width="1.5" opacity="0.4"/>
        <line x1="17" y1="10" x2="39" y2="22.5" stroke="url(#gA)" stroke-width="1.5" opacity="0.4"/>
        <line x1="0" y1="20" x2="0" y2="45" stroke="url(#gA)" stroke-width="1.5" opacity="0.4"/>
        <line x1="-17" y1="10" x2="-39" y2="22.5" stroke="url(#gA)" stroke-width="1.5" opacity="0.4"/>
        <line x1="-17" y1="-10" x2="-39" y2="-22.5" stroke="url(#gA)" stroke-width="1.5" opacity="0.4"/>
      </g>
      <!-- テキスト -->
      <text x="140" y="75" font-family="Quicksand, sans-serif" font-weight="700" font-size="68" letter-spacing="6" fill="url(#gA)">UMIDAS</text>
    </svg>
    <div class="label">A: 六角形甲羅（線画）+ 横並び</div>
  </div>

  <!-- B案: 甲羅を塗りで + 横並び -->
  <div class="logo-card">
    <svg width="520" height="120" viewBox="0 0 520 120">
      <defs>
        <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#89CFF0"/>
          <stop offset="50%" style="stop-color:#4AABE0"/>
          <stop offset="100%" style="stop-color:#2080C0"/>
        </linearGradient>
      </defs>
      <g transform="translate(60,60)">
        <!-- 外枠（塗り） -->
        <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="url(#gB)" opacity="0.15"/>
        <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="none" stroke="url(#gB)" stroke-width="2.5"/>
        <!-- 内部パターン -->
        <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="url(#gB)" opacity="0.25"/>
        <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="url(#gB)" stroke-width="1.5"/>
        <!-- 放射線 -->
        <line x1="0" y1="-18" x2="0" y2="-44" stroke="url(#gB)" stroke-width="1.5"/>
        <line x1="16" y1="-9" x2="38" y2="-22" stroke="url(#gB)" stroke-width="1.5"/>
        <line x1="16" y1="9" x2="38" y2="22" stroke="url(#gB)" stroke-width="1.5"/>
        <line x1="0" y1="18" x2="0" y2="44" stroke="url(#gB)" stroke-width="1.5"/>
        <line x1="-16" y1="9" x2="-38" y2="22" stroke="url(#gB)" stroke-width="1.5"/>
        <line x1="-16" y1="-9" x2="-38" y2="-22" stroke="url(#gB)" stroke-width="1.5"/>
      </g>
      <text x="140" y="75" font-family="Quicksand, sans-serif" font-weight="700" font-size="68" letter-spacing="6" fill="url(#gB)">UMIDAS</text>
    </svg>
    <div class="label">B: 六角形甲羅（塗り+線）+ 横並び</div>
  </div>

  <!-- C案: 丸みのある甲羅 + 上下配置 -->
  <div class="logo-card">
    <svg width="300" height="220" viewBox="0 0 300 220">
      <defs>
        <linearGradient id="gC" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7EC8E3"/>
          <stop offset="100%" style="stop-color:#2888C8"/>
        </linearGradient>
      </defs>
      <g transform="translate(150,75)">
        <!-- 丸みのある甲羅外形 -->
        <ellipse cx="0" cy="0" rx="55" ry="48" fill="none" stroke="url(#gC)" stroke-width="3"/>
        <!-- 中央六角 -->
        <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="url(#gC)" stroke-width="2"/>
        <!-- 上の三角区画 -->
        <path d="M0,-18 L0,-48" stroke="url(#gC)" stroke-width="1.5"/>
        <path d="M16,-9 L42,-25" stroke="url(#gC)" stroke-width="1.5"/>
        <path d="M-16,-9 L-42,-25" stroke="url(#gC)" stroke-width="1.5"/>
        <!-- 下の三角区画 -->
        <path d="M0,18 L0,48" stroke="url(#gC)" stroke-width="1.5"/>
        <path d="M16,9 L42,25" stroke="url(#gC)" stroke-width="1.5"/>
        <path d="M-16,9 L-42,25" stroke="url(#gC)" stroke-width="1.5"/>
      </g>
      <text x="150" y="175" text-anchor="middle" font-family="Quicksand, sans-serif" font-weight="700" font-size="52" letter-spacing="6" fill="url(#gC)">UMIDAS</text>
    </svg>
    <div class="label">C: 楕円甲羅 + 上下配置</div>
  </div>

  <!-- D案: ミニマル甲羅（Uの中に甲羅模様） -->
  <div class="logo-card">
    <svg width="480" height="120" viewBox="0 0 480 120">
      <defs>
        <linearGradient id="gD" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#7EC8E3"/>
          <stop offset="100%" style="stop-color:#2888C8"/>
        </linearGradient>
      </defs>
      <!-- U with shell pattern inside -->
      <g transform="translate(10,15)">
        <!-- Uの文字パス -->
        <text x="0" y="80" font-family="Quicksand, sans-serif" font-weight="700" font-size="90" fill="url(#gD)">U</text>
        <!-- Uの中に小さい甲羅パターン -->
        <g transform="translate(33,50)" opacity="0.5">
          <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#fff" stroke-width="1.5"/>
          <line x1="0" y1="-12" x2="0" y2="-20" stroke="#fff" stroke-width="1" opacity="0.6"/>
          <line x1="10" y1="-6" x2="16" y2="-10" stroke="#fff" stroke-width="1" opacity="0.6"/>
          <line x1="10" y1="6" x2="16" y2="10" stroke="#fff" stroke-width="1" opacity="0.6"/>
        </g>
      </g>
      <text x="80" y="95" font-family="Quicksand, sans-serif" font-weight="700" font-size="90" letter-spacing="4" fill="url(#gD)">MIDAS</text>
    </svg>
    <div class="label">D: Uの中に甲羅模様を埋め込み</div>
  </div>

  <!-- E案: 甲羅シールド + テキスト -->
  <div class="logo-card">
    <svg width="520" height="130" viewBox="0 0 520 130">
      <defs>
        <linearGradient id="gE" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#89CFF0"/>
          <stop offset="100%" style="stop-color:#1E78B8"/>
        </linearGradient>
        <linearGradient id="gE2" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#7EC8E3"/>
          <stop offset="100%" style="stop-color:#3090D0"/>
        </linearGradient>
      </defs>
      <g transform="translate(60,65)">
        <!-- シールド型甲羅 -->
        <path d="M0,-48 L40,-28 L40,15 Q40,48 0,52 Q-40,48 -40,15 L-40,-28 Z" fill="url(#gE2)" opacity="0.12"/>
        <path d="M0,-48 L40,-28 L40,15 Q40,48 0,52 Q-40,48 -40,15 L-40,-28 Z" fill="none" stroke="url(#gE2)" stroke-width="2.5"/>
        <!-- 甲羅パターン -->
        <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="none" stroke="url(#gE2)" stroke-width="1.5" opacity="0.7"/>
        <line x1="0" y1="-16" x2="0" y2="-42" stroke="url(#gE2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="14" y1="-8" x2="36" y2="-24" stroke="url(#gE2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="14" y1="8" x2="36" y2="18" stroke="url(#gE2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="0" y1="16" x2="0" y2="46" stroke="url(#gE2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="-14" y1="8" x2="-36" y2="18" stroke="url(#gE2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="-14" y1="-8" x2="-36" y2="-24" stroke="url(#gE2)" stroke-width="1.2" opacity="0.5"/>
      </g>
      <text x="140" y="82" font-family="Quicksand, sans-serif" font-weight="700" font-size="68" letter-spacing="6" fill="url(#gE)">UMIDAS</text>
    </svg>
    <div class="label">E: シールド型甲羅 + 横並び</div>
  </div>

  <!-- F案: 3連六角形 + テキスト -->
  <div class="logo-card">
    <svg width="520" height="120" viewBox="0 0 520 120">
      <defs>
        <linearGradient id="gF" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#89CFF0"/>
          <stop offset="50%" style="stop-color:#4AABE0"/>
          <stop offset="100%" style="stop-color:#2080C0"/>
        </linearGradient>
      </defs>
      <g transform="translate(55,60)">
        <!-- 左六角 -->
        <polygon points="-22,-13 -10,-20 2,-13 2,0 -10,7 -22,0" fill="url(#gF)" opacity="0.2" stroke="url(#gF)" stroke-width="1.5"/>
        <!-- 中央六角 -->
        <polygon points="-10,7 2,0 14,7 14,20 2,27 -10,20" fill="url(#gF)" opacity="0.35" stroke="url(#gF)" stroke-width="1.5"/>
        <!-- 右六角 -->
        <polygon points="2,-13 14,-20 26,-13 26,0 14,7 2,0" fill="url(#gF)" opacity="0.25" stroke="url(#gF)" stroke-width="1.5"/>
        <!-- 上の小六角 -->
        <polygon points="-10,-33 2,-40 14,-33 14,-20 2,-13 -10,-20" fill="url(#gF)" opacity="0.15" stroke="url(#gF)" stroke-width="1"/>
        <!-- 左下六角 -->
        <polygon points="-34,0 -22,-7 -10,0 -10,13 -22,20 -34,13" fill="url(#gF)" opacity="0.1" stroke="url(#gF)" stroke-width="1"/>
        <!-- 右下六角 -->
        <polygon points="14,0 26,-7 38,0 38,13 26,20 14,13" fill="url(#gF)" opacity="0.1" stroke="url(#gF)" stroke-width="1"/>
      </g>
      <text x="130" y="75" font-family="Quicksand, sans-serif" font-weight="700" font-size="68" letter-spacing="6" fill="url(#gF)">UMIDAS</text>
    </svg>
    <div class="label">F: ハニカム（蜂の巣型甲羅）+ 横並び</div>
  </div>

</div>

</body>
</html>
